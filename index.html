<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Format Knowledge Base</title>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #fcfcfc;
      color: #333;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 25px;
    }

    .search-wrapper { 
      position: relative; 
      margin-bottom: 15px; 
    }
    
    #searchInput { 
      width: 100%; 
      padding: 14px; 
      font-size: 16px; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      box-sizing: border-box; 
    }
    
    #resetSearchBtn { 
      position: absolute; 
      right: 14px; 
      top: 50%; 
      transform: translateY(-50%); 
      background: none; 
      border: none; 
      font-size: 18px; 
      cursor: pointer; 
      color: #999; 
    }

    .new-search-btn {
      background-color: #f0f0f0;
      color: #333;
      border: 1px solid #ccc;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 25px;
      display: block;
      transition: background-color 0.2s;
    }

    .new-search-btn:hover {
      background-color: #e2e2e2;
    }
    
    /* Top level navigation for Data Types */
    .data-type-container {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
      padding-bottom: 15px;
      flex-wrap: wrap;
    }
    
    .data-type-btn {
      padding: 10px 18px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .data-type-btn:hover { 
      background: #f5f5f5; 
    }
    
    .data-type-btn.active {
      background: #28a745;
      color: #fff;
      border-color: #28a745;
    }

    /* Sub level navigation for Status Tags */
    .tag-container { 
      display: flex; 
      gap: 10px; 
      margin-bottom: 25px; 
      flex-wrap: wrap; 
    }
    
    /* Standard styling for alle statusknapper */
.tag-btn { 
  padding: 8px 16px; 
  border: 1px solid #ddd; 
  background: #fff; 
  border-radius: 20px; 
  cursor: pointer; 
  font-size: 14px; 
  font-weight: 600;
  transition: all 0.2s ease; 
}

.tag-btn:hover:not(:disabled) { 
  background: #f5f5f5; 
}

/* MAGIEN: Bruker variabelen fra HTML når knappen er aktiv */
.tag-btn.active {
  background-color: var(--active-color);
  border-color: var(--active-color);
  color: #fff;
}

/* Hvis en knapp blir deaktivert av søk */
.tag-btn:disabled {
  opacity: 0.3 !important;
  cursor: not-allowed !important;
  background-color: #f8f9fa !important;
  color: #adb5bd !important;
  border-color: #e9ecef !important;
}
    
    #searchCounter { 
      font-size: 14px; 
      color: #666; 
      margin-bottom: 20px; 
    }
    
    /* Article Cards styling */
    #articlesContainer {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .filterable { 
      background: #fff; 
      padding: 22px; 
      border-radius: 8px; 
      border: 1px solid #eee; 
      cursor: pointer; 
      transition: all 0.2s ease; 
    }
    
    .filterable:hover { 
      background-color: #fbfbfb; 
      transform: translateY(-2px); 
      box-shadow: 0 4px 10px rgba(0,0,0,0.04); 
    }
    
    .filterable h2 { 
      margin-top: 0; 
      margin-bottom: 12px; 
      font-size: 22px; 
      color: #111;
    }
    
    .filterable p { 
      margin: 0; 
      line-height: 1.6; 
      color: #444; 
      white-space: pre-line;
    }
    
    .read-more-btn {
      background: none;
      border: none;
      color: #0056b3;
      font-weight: bold;
      padding: 0;
      margin-top: 12px;
      font-size: 14px;
      cursor: pointer;
      display: block;
    }
    
    .read-more-btn:hover {
      text-decoration: underline;
    }

    .full-content {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #eee;
    }

    /* NEW: Visual styling for Technical Format Identification container */
    .identification-content {
      margin-top: 15px;
      padding: 12px 16px;
      background-color: #f8f9fa;
      border-left: 4px solid #6c757d;
      border-radius: 4px;
    }

    .identification-content p {
      font-family: inherit;
      color: #495057;
    }
    
    mark { 
      background-color: #ffeb3b; 
      padding: 0 2px; 
      border-radius: 2px; 
    }
    
    .hidden { display: none !important; }
    .invisible { visibility: hidden; }
    #noResults { text-align: center; padding: 40px 20px; background: #fff; border-radius: 8px; border: 1px dashed #ccc; }
  </style>
</head>
<body>

  <h1>Format Registry</h1>

  <!-- Data Types Top Navigation Menu -->
  <div class="data-type-container">
    <button class="data-type-btn" data-type="all">All Data Types</button>
    <button class="data-type-btn" data-type="structured data">Structured Data</button>
    <button class="data-type-btn" data-type="plain text">Plain Text</button>
    <button class="data-type-btn" data-type="code">Code</button>
    <button class="data-type-btn" data-type="images">Images</button>
    <button class="data-type-btn" data-type="audiovisual data">Audiovisual Data</button>
    <button class="data-type-btn" data-type="other binaries">Other Binaries</button>
  </div>
  <!-- Global Search Input Bar -->
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search formats by keywords or byte signatures..." autocomplete="off">
    <button id="resetSearchBtn" class="invisible">✕</button>
  </div>

  <!-- New Search / Global Master Reset Button -->
  <button id="newSearchBtn" class="new-search-btn">New Search / Reset All</button>

  <!-- Status Tags Sub Level Menu -->
  <div class="tag-container">
    <button class="tag-btn" data-value="all">All Statuses</button>
    <button class="tag-btn" data-value="recommendable">Recommendable</button>
    <button class="tag-btn" data-value="migratable">Migratable</button>
    <button class="tag-btn" data-value="debatable">Debatable</button>
  </div>

  <!-- Feedback Messaging Systems and Dynamic Output Containers -->
  <p id="searchCounter">Loading registry index...</p>
  <div id="articlesContainer"></div>
  <div id="noResults" class="hidden"><h3>No matching formats found.</h3></div>

  <!-- Execution Script Connection -->
  <script src="script.js"></script>
</body>
</html>
