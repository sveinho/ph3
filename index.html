<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Format Knowledge Base</title>
    <!-- Kobler til det nye, rene stilarket ditt -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Format Registry</h1>

<!-- Data Types Top Navigation Menu (Using your clean slate-grey strategy) -->
<div class="data-type-container">
  <button class="data-type-btn" data-type="all" style="--bg-color: #1e293b; --text-color: #fff;">All Data Types</button>
  <button class="data-type-btn" data-type="structured data" style="--bg-color: #1e293b; --text-color: #fff;">Structured Data</button>
  <button class="data-type-btn" data-type="plain text" style="--bg-color: #1e293b; --text-color: #fff;">Plain Text</button>
  <button class="data-type-btn" data-type="code" style="--bg-color: #1e293b; --text-color: #fff;">Code</button>
  <button class="data-type-btn" data-type="images" style="--bg-color: #1e293b; --text-color: #fff;">Images</button>
  <button class="data-type-btn" data-type="audiovisual data" style="--bg-color: #1e293b; --text-color: #fff;">Audiovisual Data</button>
  <button class="data-type-btn" data-type="other binaries" style="--bg-color: #1e293b; --text-color: #fff;">Other Binaries</button>
</div>

  <!-- Global Search Input Bar -->
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search formats by keywords or byte signatures..." autocomplete="off">
    <button id="resetSearchBtn" class="invisible">✕</button>
  </div>

  <!-- New Search / Global Master Reset Button -->
  <button id="newSearchBtn" class="new-search-btn">New Search / Reset All</button>

  <!-- Status Tags Sub Level Menu -->
<div class="tag-container">
  <button class="tag-btn" data-value="all" style="--bg-color: #0056b3; --text-color: #fff;">All Statuses</button>
  <button class="tag-btn" data-value="recommendable" style="--bg-color: #28a745; --text-color: #fff;">Recommendable</button>
  <button class="tag-btn" data-value="migratable" style="--bg-color: #fd7e14; --text-color: #fff;">Migratable</button>
  <button class="tag-btn" data-value="debatable" style="--bg-color: #dc3545; --text-color: #fff;">Debatable</button>
</div>
  
  <!-- Feedback Messaging Systems and Dynamic Output Containers -->
  <p id="searchCounter">Loading registry index...</p>
  <div id="articlesContainer"></div>
  <div id="noResults" class="hidden"><h3>No matching formats found.</h3></div>

  <!-- Execution Script Connection -->
  <script src="script.js"></script>
</body>
</html>
